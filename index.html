<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masajes MJ - Wellness & Spa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'ritual-gold': '#C8A165', 'ritual-dark': '#2C2A29', 'ritual-bg': '#FDFBF7' } } } }
    </script>
</head>
<body class="bg-ritual-bg text-ritual-dark min-h-screen flex flex-col font-sans">

    <header class="bg-ritual-dark text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-serif tracking-widest text-ritual-gold">MASAJES MJ</h1>
            <button id="btnLogout" class="hidden text-xs border border-ritual-gold px-2 py-1 rounded" onclick="cerrarSesion()">Salir</button>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 max-w-lg">
        <section id="auth-screen" class="py-10">
            <div class="bg-white p-6 rounded-lg shadow-xl border-t-4 border-ritual-gold">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 border rounded">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 mb-4 border rounded">
                <button onclick="login()" class="w-full bg-ritual-gold text-white font-bold py-3 mb-3 rounded">INICIAR SESIÓN</button>
                <button onclick="registro()" class="w-full text-gray-500 text-xs underline">Crear cuenta</button>
                <p id="auth-error" class="text-red-500 text-center mt-3 text-xs"></p>
            </div>
        </section>

        <section id="client-panel" class="hidden space-y-6">
            <h2 class="text-xl font-serif">Hola, <span id="client-welcome-name"></span></h2>
            <div id="calendar-client-container"></div>
            <select id="horaSolicitud" class="w-full p-2 border rounded text-sm"></select>
            <textarea id="notaCliente" placeholder="Notas..." class="w-full p-2 border rounded text-sm"></textarea>
            <button onclick="solicitarCita()" class="w-full bg-ritual-gold text-white py-2 rounded font-bold">Enviar Solicitud</button>
            <div id="lista-mis-citas" class="space-y-2"></div>
            
            <div class="bg-white p-4 rounded shadow mt-6">
                <h3 class="font-bold text-xs mb-2">Chat con MJ</h3>
                <div id="chat-box-client" class="h-40 overflow-y-auto bg-gray-50 p-2 border rounded text-xs flex flex-col gap-2"></div>
                <div class="flex gap-2 mt-2">
                    <input type="text" id="msg-client" class="flex-grow p-2 border rounded text-sm" placeholder="Mensaje...">
                    <button onclick="enviarMensajeCliente()" class="bg-ritual-dark text-white px-3 rounded"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <section id="admin-panel" class="hidden space-y-6">
            <h2 class="bg-ritual-gold text-white p-3 text-center font-serif">AGENDA DE MJ</h2>
            <div id="calendar-admin-container"></div>
            <div id="lista-solicitudes" class="space-y-2"></div>
            <div id="lista-todas-citas" class="space-y-2"></div>
            <div class="grid grid-cols-3 h-64 border rounded">
                <div id="admin-chat-threads" class="col-span-1 border-r overflow-y-auto bg-gray-50 p-2"></div>
                <div class="col-span-2 flex flex-col p-2 bg-white">
                    <div id="chat-box-admin" class="flex-grow overflow-y-auto bg-gray-50 p-2 text-xs"></div>
                    <div class="flex gap-2 mt-2">
                        <input type="text" id="msg-admin" class="flex-grow p-2 border rounded text-xs" placeholder="Responder...">
                        <button onclick="enviarMensajeAdmin()" class="bg-ritual-dark text-white px-3 rounded"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <div id="modal-reprogramar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center p-4 z-[100]">
            <div class="bg-white p-5 rounded-lg w-full max-w-sm">
                <h3 class="font-bold mb-3">Nueva fecha propuesta</h3>
                <input type="date" id="repo-date" class="w-full p-2 border mb-2">
                <select id="repo-time" class="w-full p-2 border mb-4">
                    <option value="09:00">09:00</option><option value="10:00">10:00</option><option value="17:00">17:00</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="window.confirmarReprogramacion()" class="bg-ritual-gold text-white flex-grow py-2 rounded">Enviar</button>
                    <button onclick="document.getElementById('modal-reprogramar').classList.add('hidden')" class="bg-gray-200 flex-grow py-2 rounded">Cancelar</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAIqduek2X9EaRbGlojrcHvxupiU4oPQcw", authDomain: "quiromasaje-mj.firebaseapp.com", projectId: "quiromasaje-mj", storageBucket: "quiromasaje-mj.firebasestorage.app", messagingSenderId: "747145274624", appId: "1:747145274624:web:d1886642fd077d60a63fe5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "mjll5@masajesmj.com";
        let selectedChatUserId = null;
        let citaAReprogramarId = null;

        window.login = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); } catch(e) { document.getElementById('auth-error').innerText = "Error"; } };
        window.registro = async () => { try { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); } catch(e) { alert("Error"); } };
        window.cerrarSesion = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    iniciarListenersAdmin();
                } else {
                    document.getElementById('client-panel').classList.remove('hidden');
                    document.getElementById('client-welcome-name').innerText = user.email;
                    iniciarListenersCliente(user.uid);
                    cargarChat(user.uid, 'chat-box-client');
                }
            }
        });

        // Chat funcional y reparado
        window.cargarChat = (uid, contenedorId) => {
            const div = document.getElementById(contenedorId);
            const q = query(collection(db, "mensajes"), where("userId", "==", uid));
            onSnapshot(q, (snap) => {
                let msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                div.innerHTML = msgs.map(m => `
                    <div class="${m.senderId === 'admin' ? 'self-start bg-gray-200' : 'self-end bg-ritual-dark text-white'} p-2 rounded text-[11px] mb-1">
                        <p class="font-bold text-[9px] opacity-75">${m.senderName}</p>
                        ${m.texto}
                    </div>`).join('');
                div.scrollTop = div.scrollHeight;
            });
        };

        window.enviarMensajeCliente = async () => {
            const txt = document.getElementById('msg-client').value;
            if(!txt) return;
            await addDoc(collection(db, "mensajes"), { userId: auth.currentUser.uid, senderId: auth.currentUser.uid, senderName: 'Yo', texto: txt, timestamp: serverTimestamp() });
            document.getElementById('msg-client').value = '';
        };

        window.enviarMensajeAdmin = async () => {
            const txt = document.getElementById('msg-admin').value;
            if(!txt || !selectedChatUserId) return;
            await addDoc(collection(db, "mensajes"), { userId: selectedChatUserId, senderId: 'admin', senderName: 'MJ', texto: txt, timestamp: serverTimestamp() });
            document.getElementById('msg-admin').value = '';
        };

        // Reprogramación
        window.abrirModalReprogramar = (id) => { citaAReprogramarId = id; document.getElementById('modal-reprogramar').classList.remove('hidden'); };
        window.confirmarReprogramacion = async () => {
            const f = document.getElementById('repo-date').value;
            const h = document.getElementById('repo-time').value;
            await updateDoc(doc(db, "citas", citaAReprogramarId), { estado: "reprogramada", fechaPropuesta: `${f}T${h}` });
            document.getElementById('modal-reprogramar').classList.add('hidden');
        };
        
        window.responderReprogramacionCliente = async (id, acepta, nuevaFecha) => {
            if(acepta) await updateDoc(doc(db, "citas", id), { estado: "confirmada", fecha: nuevaFecha });
            else await updateDoc(doc(db, "citas", id), { estado: "rechazada" });
        };

        // ... El resto de funciones (solicitarCita, renderizado, etc.) se mantienen igual que en tu base anterior.
    </script>
</body>
</html>
