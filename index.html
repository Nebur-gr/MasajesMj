<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Masajes MJ - Acceso</title>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Bienvenida a MJ</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 border rounded">
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 mb-4 border rounded">
            <button onclick="login()" class="w-full bg-[#C8A165] text-white py-3 rounded font-bold mb-3">INICIAR SESIÓN</button>
            <button onclick="registro()" class="w-full text-gray-500 text-xs underline">Crear cuenta</button>
            <p id="auth-error" class="text-red-500 text-center mt-3 text-xs"></p>
        </div>
    </div>

    <!-- Panel principal (oculto inicialmente) -->
    <div id="app-content" class="hidden p-4">
        <div class="max-w-md mx-auto">
            <h1 class="text-xl font-bold mb-4">Panel de Gestión</h1>
            <button onclick="cerrarSesion()" class="text-xs text-red-500 underline mb-4">Cerrar sesión</button>
            <div id="main-ui"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIqduek2X9EaRbGlojrcHvxupiU4oPQcw",
            authDomain: "quiromasaje-mj.firebaseapp.com",
            projectId: "quiromasaje-mj",
            storageBucket: "quiromasaje-mj.firebasestorage.app",
            messagingSenderId: "747145274624",
            appId: "1:747145274624:web:d1886642fd077d60a63fe5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { 
                await signInWithEmailAndPassword(auth, e, p); 
            } catch (err) { 
                document.getElementById('auth-error').innerText = "Error al entrar: " + err.message; 
            }
        };

        window.registro = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { 
                await createUserWithEmailAndPassword(auth, e, p); 
            } catch (err) { 
                document.getElementById('auth-error').innerText = err.message; 
            }
        };

        window.cerrarSesion = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                // Aquí se cargaría el resto de la lógica de citas
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
